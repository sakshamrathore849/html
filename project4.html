<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternConnect - Internship Application Form</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Type Selector */
body {
    font-family: Arial, sans-serif;
    font-size: 18px;
}

/* Style legend using type selector */
legend {
    color: darkblue;
    font-size: 22px;
}

/* Style label using type selector */
label {
    color: darkgreen;
    font-size: 18px;
}

/* ID Selector */
#name {
    color: blue;
    font-size: 18px;
}

/* Button Styling */
button {
    background-color: navy;
    color: white;
    font-size: 18px;
}
    </style>
</head>
<body>

    <h1>InternConnect</h1>

    <form method="post">

        <fieldset>
            <legend>Personal Information</legend>

            <label for="name">Full Name:</label><br>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"
                   pattern="[0-9]{10}"
                   placeholder="10-digit number"><br><br>

            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob"><br><br>
        </fieldset>

        <fieldset>
            <legend>Internship Details</legend>

            <label>Preferred Role:</label><br>

            <input type="radio" id="web" name="role" value="Web Development">
            <label for="web">Web Development</label><br>

            <input type="radio" id="app" name="role" value="App Development">
            <label for="app">App Development</label><br>

            <input type="radio" id="data" name="role" value="Data Science">
            <label for="data">Data Science</label><br><br>

            <label for="skill">Skill Level:</label><br>
            <input type="range" id="skill" name="skill"
                   min="1" max="10"><br><br>

            <label for="course">Current Course:</label><br>
            <input list="courses" id="course" name="course">

            <datalist id="courses">
                <option value="B.Tech">
                <option value="BCA">
                <option value="MCA">
                <option value="B.Sc IT">
            </datalist>
            <br><br>

            <label for="message">Why do you want this internship?</label><br>
            <textarea id="message" name="message" rows="4" cols="40"></textarea>
            <br><br>

            <button type="submit">Submit Application</button>

        </fieldset>

    </form>

</body>
</html>
