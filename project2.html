<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GadgetMart - Product Showcase</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Type Selector */
body {
    font-family: Arial, sans-serif;
    font-size: 18px;
}

/* Header */
header {
    background-color: navy;
    color: white;
}

/* Card Class Selector */
.card {
    background-color: lightgray;
}

/* Title Class */
.title {
    color: blue;
    font-size: 24px;
}

/* Price Class */
.price {
    color: green;
    font-size: 20px;
}
    </style>
</head>

<body>

    <header>
        <h1>GadgetMart</h1>
    </header>

    <main>

        <figure class="card">
            <img src="phone.jpg" alt="Smartphone Image" width="200">
            <figcaption class="title">Smartphone X</figcaption>
            <p class="price">₹25,999</p>
            <ul>
                <li>6.5-inch Display</li>
                <li>128GB Storage</li>
                <li>5000mAh Battery</li>
            </ul>
        </figure>

        <figure class="card">
            <img src="laptop.jpg" alt="Laptop Image" width="200">
            <figcaption class="title">Laptop Pro</figcaption>
            <p class="price">₹59,999</p>
            <ul>
                <li>Intel Core i5 Processor</li>
                <li>8GB RAM</li>
                <li>512GB SSD</li>
            </ul>
        </figure>

    </main>

</body>
</html>
