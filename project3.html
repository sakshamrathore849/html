<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spice Route Restaurant - Digital Menu</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Type Selector */
body {
    font-family: Times New Roman, serif;
    font-size: 18px;
}

/* Header */
header {
    background-color: darkred;
    color: white;
}

/* Table Header Cells */
th {
    background-color: orange;
    color: white;
}

/* Table Caption */
caption {
    font-size: 28px;
}
    </style>
</head>
<body>

    <header>
        <h1>Spice Route Restaurant</h1>
    </header>

    <table>
        <caption>Restaurant Menu</caption>

        <tr>
            <th>Dish</th>
            <th>Category</th>
            <th>Price</th>
        </tr>

        <tr>
            <td>Paneer Butter Masala</td>
            <td>Main Course</td>
            <td>₹250</td>
        </tr>

        <tr>
            <td>Veg Biryani</td>
            <td>Rice</td>
            <td>₹220</td>
        </tr>

        <tr>
            <td>Gulab Jamun</td>
            <td>Dessert</td>
            <td>₹80</td>
        </tr>

    </table>

</body>
</html>
